<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .bg { fill: #0A0A0F; }
      .text-white { fill: #FFFFFF; font-family: 'Segoe UI', Arial, sans-serif; }
      .text-center { text-anchor: middle; }
      .node-green { fill: #10B981; }
      .node-blue { fill: #3B82F6; }
      .node-purple { fill: #8B5CF6; }
      .node-gold { fill: #F59E0B; }
      .arrow { fill: none; stroke: #FFFFFF; stroke-width: 2; marker-end: url(#arrowhead); }
      .center-circle { fill: #1F2937; stroke: #374151; stroke-width: 2; }
      .tool-icon { fill: #9CA3AF; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FFFFFF" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" class="bg"/>
  
  <!-- Center circle -->
  <circle cx="400" cy="250" r="80" class="center-circle"/>
  
  <!-- Center text -->
  <text x="400" y="245" class="text-white text-center" font-size="18" font-weight="bold">Agente IA</text>
  
  <!-- Tool icons around center -->
  <g class="tool-icon">
    <!-- Search icon -->
    <circle cx="380" cy="270" r="8" fill="none" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="385" y1="275" x2="390" y2="280" stroke="#9CA3AF" stroke-width="2"/>
    
    <!-- Calculator icon -->
    <rect x="405" y="265" width="16" height="12" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <line x1="408" y1="268" x2="418" y2="268" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="408" y1="271" x2="418" y2="271" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="408" y1="274" x2="418" y2="274" stroke="#9CA3AF" stroke-width="1"/>
    
    <!-- Memory icon -->
    <rect x="385" y="225" width="12" height="8" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <line x1="387" y1="227" x2="395" y2="227" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="387" y1="229" x2="395" y2="229" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="387" y1="231" x2="395" y2="231" stroke="#9CA3AF" stroke-width="1"/>
  </g>
  
  <!-- Node 1: PERCEBER (top) -->
  <circle cx="400" cy="100" r="50" class="node-green"/>
  <text x="400" y="95" class="text-white text-center" font-size="24">👁️</text>
  <text x="400" y="115" class="text-white text-center" font-size="14" font-weight="bold">PERCEBER</text>
  
  <!-- Node 2: DECIDIR (right) -->
  <circle cx="550" cy="250" r="50" class="node-blue"/>
  <text x="550" y="245" class="text-white text-center" font-size="24">🧠</text>
  <text x="550" y="265" class="text-white text-center" font-size="14" font-weight="bold">DECIDIR</text>
  
  <!-- Node 3: AGIR (bottom) -->
  <circle cx="400" cy="400" r="50" class="node-purple"/>
  <text x="400" y="395" class="text-white text-center" font-size="24">🔧</text>
  <text x="400" y="415" class="text-white text-center" font-size="14" font-weight="bold">AGIR</text>
  
  <!-- Node 4: OBSERVAR (left) -->
  <circle cx="250" cy="250" r="50" class="node-gold"/>
  <text x="250" y="245" class="text-white text-center" font-size="24">👀</text>
  <text x="250" y="265" class="text-white text-center" font-size="14" font-weight="bold">OBSERVAR</text>
  
  <!-- Arrows -->
  <!-- PERCEBER to DECIDIR -->
  <path d="M 440 130 Q 520 160 520 210" class="arrow"/>
  
  <!-- DECIDIR to AGIR -->
  <path d="M 520 290 Q 490 360 440 370" class="arrow"/>
  
  <!-- AGIR to OBSERVAR -->
  <path d="M 360 370 Q 290 340 280 290" class="arrow"/>
  
  <!-- OBSERVAR to PERCEBER -->
  <path d="M 280 210 Q 310 140 360 130" class="arrow"/>
  
  <!-- Side note -->
  <text x="650" y="450" class="text-white" font-size="12" font-style="italic">Repete até encontrar</text>
  <text x="650" y="465" class="text-white" font-size="12" font-style="italic">resposta satisfatória</text>
</svg>