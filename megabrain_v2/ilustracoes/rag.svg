<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .bg { fill: #0A0A0F; }
      .title { fill: #FFFFFF; font-family: 'Arial', sans-serif; font-size: 24px; font-weight: bold; }
      .subtitle { fill: #B0B0B0; font-family: 'Arial', sans-serif; font-size: 14px; }
      .text { fill: #E0E0E0; font-family: 'Arial', sans-serif; font-size: 12px; }
      .text-small { fill: #C0C0C0; font-family: 'Arial', sans-serif; font-size: 10px; }
      .box-red { fill: #2A1A1A; stroke: #FF4444; stroke-width: 2; }
      .box-green { fill: #1A2A1A; stroke: #44FF44; stroke-width: 2; }
      .box-neutral { fill: #1A1A2A; stroke: #4444FF; stroke-width: 2; }
      .arrow { stroke: #CCCCCC; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-red { stroke: #FF4444; stroke-width: 2; fill: none; marker-end: url(#arrowhead-red); }
      .arrow-green { stroke: #44FF44; stroke-width: 2; fill: none; marker-end: url(#arrowhead-green); }
      .icon { fill: #FFAA00; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#CCCCCC" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF4444" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44FF44" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" class="bg"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">RAG - Retrieval Augmented Generation</text>
  
  <!-- Left Side - Sem RAG -->
  <text x="150" y="60" text-anchor="middle" class="subtitle" fill="#FF4444">Sem RAG</text>
  
  <!-- User Question -->
  <rect x="50" y="80" width="200" height="40" rx="5" class="box-red"/>
  <text x="60" y="95" class="text">❓ Pergunta do Usuário</text>
  <text x="60" y="110" class="text-small">"Como funciona a fotossíntese?"</text>
  
  <!-- Arrow down -->
  <line x1="150" y1="120" x2="150" y2="160" class="arrow-red"/>
  
  <!-- LLM without context -->
  <rect x="50" y="160" width="200" height="60" rx="5" class="box-red"/>
  <text x="60" y="180" class="text">🤖 LLM (sem contexto)</text>
  <text x="60" y="195" class="text-small">Conhecimento limitado</text>
  <text x="60" y="210" class="text-small">Pode alucinar informações</text>
  
  <!-- Arrow down -->
  <line x1="150" y1="220" x2="150" y2="260" class="arrow-red"/>
  
  <!-- Generic Response -->
  <rect x="50" y="260" width="200" height="50" rx="5" class="box-red"/>
  <text x="60" y="280" class="text">❌ Resposta Genérica</text>
  <text x="60" y="295" class="text-small">Imprecisa ou incorreta</text>
  
  <!-- Right Side - Com RAG -->
  <text x="600" y="60" text-anchor="middle" class="subtitle" fill="#44FF44">Com RAG</text>
  
  <!-- Step 1: Documents -->
  <rect x="320" y="80" width="120" height="40" rx="5" class="box-neutral"/>
  <text x="330" y="95" class="text">📄 Documentos</text>
  <text x="330" y="110" class="text-small">Chunk & Embed</text>
  
  <!-- Arrow to Vector DB -->
  <line x1="440" y1="100" x2="480" y2="100" class="arrow"/>
  
  <!-- Vector Database -->
  <rect x="480" y="80" width="100" height="40" rx="5" class="box-neutral"/>
  <text x="490" y="95" class="text">🗄️ Vector DB</text>
  <text x="490" y="110" class="text-small">Embeddings</text>
  
  <!-- Step 2: User Question -->
  <rect x="600" y="80" width="150" height="40" rx="5" class="box-green"/>
  <text x="610" y="95" class="text">❓ Pergunta do Usuário</text>
  <text x="610" y="110" class="text-small">"Como funciona a fotossíntese?"</text>
  
  <!-- Arrow to search -->
  <line x1="675" y1="120" x2="675" y2="160" class="arrow-green"/>
  
  <!-- Similarity Search -->
  <rect x="600" y="160" width="150" height="40" rx="5" class="box-green"/>
  <text x="610" y="175" class="text">🔍 Busca Similaridade</text>
  <text x="610" y="190" class="text-small">Top-K chunks relevantes</text>
  
  <!-- Arrow back to Vector DB -->
  <line x1="600" y1="180" x2="580" y2="180" class="arrow-green"/>
  <line x1="580" y1="180" x2="580" y2="120" class="arrow-green"/>
  
  <!-- Arrow down from search -->
  <line x1="675" y1="200" x2="675" y2="240" class="arrow-green"/>
  
  <!-- Step 3: LLM with context -->
  <rect x="500" y="240" width="250" height="60" rx="5" class="box-green"/>
  <text x="510" y="260" class="text">🤖 LLM + Contexto Recuperado</text>
  <text x="510" y="275" class="text-small">Pergunta + Chunks relevantes</text>
  <text x="510" y="290" class="text-small">Conhecimento específico e atualizado</text>
  
  <!-- Arrow down -->
  <line x1="625" y1="300" x2="625" y2="340" class="arrow-green"/>
  
  <!-- Accurate Response -->
  <rect x="500" y="340" width="250" height="50" rx="5" class="box-green"/>
  <text x="510" y="360" class="text">✅ Resposta Precisa e Fundamentada</text>
  <text x="510" y="375" class="text-small">Baseada em documentos específicos</text>
  
  <!-- Process Steps Labels -->
  <text x="400" y="420" text-anchor="middle" class="subtitle">Processo RAG:</text>
  <text x="400" y="440" text-anchor="middle" class="text-small">1. Indexação → 2. Recuperação → 3. Geração Aumentada</text>
  
  <!-- Comparison Arrow -->
  <line x1="280" y1="200" x2="320" y2="200" class="arrow" stroke-dasharray="5,5"/>
  <text x="300" y="190" text-anchor="middle" class="text-small">vs</text>
</svg>