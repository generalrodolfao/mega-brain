<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00D4FF"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00FF88"/>
    </marker>
    <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <rect width="800" height="500" fill="#0A0A0F"/>
  <rect x="40" y="40" width="720" height="420" fill="url(#glow)" rx="12"/>

  <!-- Grid de fundo -->
  <g opacity="0.05">
    <line x1="120" y1="60" x2="120" y2="440" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="240" y1="60" x2="240" y2="440" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="360" y1="60" x2="360" y2="440" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="480" y1="60" x2="480" y2="440" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="600" y1="60" x2="600" y2="440" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="720" y1="60" x2="720" y2="440" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="60" y1="100" x2="740" y2="100" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="60" y1="180" x2="740" y2="180" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="60" y1="260" x2="740" y2="260" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="60" y1="340" x2="740" y2="340" stroke="#00D4FF" stroke-width="0.5"/>
    <line x1="60" y1="420" x2="740" y2="420" stroke="#00D4FF" stroke-width="0.5"/>
  </g>

  <!-- Eixos -->
  <line x1="60" y1="250" x2="740" y2="250" stroke="#6A6A8A" stroke-width="1" marker-end="url(#arrowCyan)"/>
  <line x1="400" y1="460" x2="400" y2="40" stroke="#6A6A8A" stroke-width="1" marker-end="url(#arrowCyan)"/>

  <text x="730" y="240" fill="#6A6A8A" font-size="12" font-family="monospace">dim 1</text>
  <text x="410" y="55" fill="#6A6A8A" font-size="12" font-family="monospace">dim 2</text>

  <!-- Cluster: Animais -->
  <g opacity="0.15">
    <ellipse cx="160" cy="160" rx="90" ry="70" fill="#00FF88"/>
  </g>
  <text x="160" y="130" fill="#00FF88" font-size="13" font-family="Arial" font-weight="600" text-anchor="middle">🐾 Animais</text>

  <circle cx="130" cy="170" r="22" fill="#00FF88" opacity="0.25"/>
  <text x="130" y="175" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">gato</text>

  <circle cx="180" cy="150" r="22" fill="#00FF88" opacity="0.25"/>
  <text x="180" y="155" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">cão</text>

  <circle cx="150" cy="195" r="22" fill="#00FF88" opacity="0.25"/>
  <text x="150" y="200" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">pássaro</text>

  <!-- Cluster: Tecnologia -->
  <g opacity="0.15">
    <ellipse cx="550" cy="320" rx="100" ry="65" fill="#7C5CFC"/>
  </g>
  <text x="550" y="285" fill="#7C5CFC" font-size="13" font-family="Arial" font-weight="600" text-anchor="middle">💻 Tecnologia</text>

  <circle cx="510" cy="325" r="22" fill="#7C5CFC" opacity="0.25"/>
  <text x="510" y="330" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">Python</text>

  <circle cx="570" cy="305" r="22" fill="#7C5CFC" opacity="0.25"/>
  <text x="570" y="310" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">LangGraph</text>

  <circle cx="590" cy="345" r="22" fill="#7C5CFC" opacity="0.25"/>
  <text x="590" y="350" fill="#fff" font-size="12" font-family="Arial" text-anchor="middle">API</text>

  <!-- Cluster: Comida -->
  <g opacity="0.15">
    <ellipse cx="330" cy="380" rx="80" ry="55" fill="#FFD700"/>
  </g>
  <text x="330" y="350" fill="#FFD700" font-size="13" font-family="Arial" font-weight="600" text-anchor="middle">🍕 Comida</text>

  <circle cx="300" cy="385" r="18" fill="#FFD700" opacity="0.25"/>
  <text x="300" y="389" fill="#fff" font-size="11" font-family="Arial" text-anchor="middle">pizza</text>

  <circle cx="350" cy="375" r="18" fill="#FFD700" opacity="0.25"/>
  <text x="350" y="379" fill="#fff" font-size="11" font-family="Arial" text-anchor="middle">café</text>

  <!-- Linha de similaridade: gato → cão (próximos) -->
  <line x1="145" y1="165" x2="168" y2="155" stroke="#00FF88" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="156" y="155" fill="#00FF88" font-size="10" font-family="Arial" opacity="0.8">θ≈15°</text>

  <!-- Linha: gato → Python (distante, não relacionado) -->
  <line x1="145" y1="175" x2="498" y2="318" stroke="#FF3355" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="320" y="240" fill="#FF3355" font-size="10" font-family="Arial" opacity="0.6">θ≈87°</text>

  <!-- Flecha da equação -->
  <rect x="150" y="440" width="500" height="38" rx="8" fill="#1A1A2E" stroke="#2A2A4A" stroke-width="1"/>
  <text x="400" y="465" fill="#FFD700" font-size="16" font-family="monospace" text-anchor="middle" font-weight="600">
    palavras próximas no espaço = significados próximos
  </text>

  <text x="400" y="28" fill="#00D4FF" font-size="20" font-family="Arial" font-weight="bold" text-anchor="middle">
    Espaço Vetorial Semântico (projeção 2D)
  </text>
</svg>
