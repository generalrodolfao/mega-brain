<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Brain v2 — Ilustrações Conceituais</title>
<style>
  :root {
    --bg: #0A0A0F;
    --card: #14141F;
    --border: #2A2A4A;
    --cyan: #00D4FF;
    --green: #00FF88;
    --gold: #FFD700;
    --purple: #7C5CFC;
    --text: #E8E8F0;
    --muted: #6A6A8A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    line-height: 1.6;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,212,255,0.06), transparent 70%);
    pointer-events: none;
  }
  .header h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    background: linear-gradient(135deg, #00D4FF, #7C5CFC);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
  }
  .header .sub {
    color: var(--muted);
    font-size: 16px;
    margin-top: 8px;
  }
  .header .tags {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .header .tag {
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .header .tag.active { border-color: var(--cyan); color: var(--cyan); }

  /* Gallery grid */
  .gallery {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
    gap: 24px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: var(--cyan);
  }
  .card-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card-num {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, #00D4FF, #7C5CFC);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .card-body {
    padding: 16px;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 320px;
    overflow-x: auto;
  }
  .card-body svg {
    max-width: 100%;
    height: auto;
  }
  .card-footer {
    padding: 12px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
  }
  .card-footer a {
    color: var(--cyan);
    text-decoration: none;
    font-weight: 500;
  }
  .card-footer a:hover { text-decoration: underline; }

  /* Fullscreen modal */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
    padding: 40px;
    cursor: pointer;
  }
  .modal.active { display: flex; }
  .modal svg {
    max-width: 90vw;
    max-height: 85vh;
    background: var(--bg);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .modal-close {
    position: fixed;
    top: 20px;
    right: 30px;
    z-index: 1001;
    color: #fff;
    font-size: 32px;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
  }

  @media (max-width: 600px) {
    .gallery { grid-template-columns: 1fr; }
    .card-body { min-height: 240px; }
  }

  /* Print styles */
  @media print {
    .header, .card-footer, .modal, .modal-close { display: none; }
    body { background: #fff; color: #000; }
    .gallery { grid-template-columns: 1fr; gap: 20px; padding: 0; }
    .card { break-inside: avoid; border: 1px solid #ccc; background: #fff; }
    .card-body { background: #fff; }
    .card-header { background: #f5f5f5; }
    .card-title { color: #000; }
    .card-desc { color: #666; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Mega Brain v2 — Ilustrações Conceituais</h1>
  <p class="sub">Diagramas técnicos para entender agentes de IA, embeddings, LangGraph e mais</p>
  <div class="tags">
    <span class="tag active">Vetores</span>
    <span class="tag">Embeddings</span>
    <span class="tag">Attention</span>
    <span class="tag">RAG</span>
    <span class="tag">Agentes</span>
    <span class="tag">LangGraph</span>
  </div>
</div>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">×</button>
  <div id="modalContent"></div>
</div>

<script>
const illustrations = [
  {
    id: 'embeddings',
    num: '01',
    title: 'O que são Vetores (Embeddings)?',
    desc: 'Como palavras são transformadas em vetores numéricos no espaço semântico',
    tags: ['Vetores', 'Embeddings', 'Fundamentos'],
  },
  {
    id: 'tokenizacao',
    num: '02',
    title: 'Tokenização: Texto → Tokens → Vetores',
    desc: 'Pipeline completa: texto é quebrado em tokens, mapeado para IDs e convertido em embeddings',
    tags: ['Tokens', 'Embeddings', 'Pipeline'],
  },
  {
    id: 'similarity',
    num: '03',
    title: 'Similaridade de Cosseno entre Vetores',
    desc: 'Como o LLM mede a proximidade semântica entre palavras usando o ângulo entre vetores',
    tags: ['Vetores', 'Similaridade', 'Cosseno'],
  },
  {
    id: 'attention',
    num: '04',
    title: 'Mecanismo de Atenção (Self-Attention)',
    desc: 'Cada token "olha" para todos os outros e decide quais são relevantes para o contexto',
    tags: ['Attention', 'Transformers', 'Fundamentos'],
  },
  {
    id: 'rag',
    num: '05',
    title: 'RAG — Retrieval Augmented Generation',
    desc: 'Como combinar busca em documentos com LLMs para respostas precisas e fundamentadas',
    tags: ['RAG', 'Vector DB', 'Ferramentas'],
  },
  {
    id: 'agent_loop',
    num: '06',
    title: 'Ciclo do Agente de IA',
    desc: 'O loop Perceber → Decidir → Agir → Observar que todo agente executa',
    tags: ['Agentes', 'Loop', 'Fundamentos'],
  },
  {
    id: 'langgraph_flow',
    num: '07',
    title: 'Arquitetura LangGraph — Mega Brain v2',
    desc: 'O grafo completo do Mega Brain v2: classificação, roteamento, squad e consolidação',
    tags: ['LangGraph', 'Arquitetura', 'Mega Brain'],
  },
  {
    id: 'espaco_vetorial',
    num: '08',
    title: 'Espaço Vetorial Semântico (Projeção 2D)',
    desc: 'Visualização de como palavras com significados similares ficam próximas no espaço vetorial',
    tags: ['Vetores', 'Embeddings', 'Visualização'],
  },
  {
    id: 'tool_calling',
    num: '09',
    title: 'Tool Calling — Como o Agente usa Ferramentas',
    desc: 'Fluxo completo do function calling: LLM decide qual ferramenta usar, código executa, LLM responde',
    tags: ['Tools', 'Function Calling', 'Agentes'],
  },
  {
    id: 'multi_agent_parallel',
    num: '10',
    title: 'Execução Paralela com Send API',
    desc: 'Comparação v1 (asyncio.gather manual) vs v2 (Send API declarativa) — fan-out e consolidação',
    tags: ['LangGraph', 'Send API', 'Paralelismo'],
  },
];

function buildGallery() {
  const gallery = document.getElementById('gallery');

  illustrations.forEach((ill, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="card-header">
        <div class="card-num">${ill.num}</div>
        <div>
          <div class="card-title">${ill.title}</div>
          <div class="card-desc">${ill.desc}</div>
        </div>
      </div>
      <div class="card-body" onclick="openModal('${ill.id}')" style="cursor:zoom-in">
        <object data="${ill.id}.svg" type="image/svg+xml" style="max-width:100%;height:auto;pointer-events:none">
          <img src="${ill.id}.svg" alt="${ill.title}" style="max-width:100%">
        </object>
      </div>
      <div class="card-footer">
        <span>${ill.tags.map(t => '#' + t).join('  ')}</span>
        <a href="${ill.id}.svg" download>↓ SVG</a>
      </div>
    `;
    gallery.appendChild(card);
  });
}

function openModal(id) {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  content.innerHTML = `<object data="${id}.svg" type="image/svg+xml" style="max-width:90vw;max-height:85vh">
    <img src="${id}.svg" style="max-width:90vw;max-height:85vh">
  </object>`;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

buildGallery();
</script>

</body>
</html>
